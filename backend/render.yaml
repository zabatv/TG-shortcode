services:
  - type: web
    name: rubitime-notifier
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rubitime-db
          property: connectionString
      - key: PORT
        value: 5050

databases:
  - name: rubitime-db
    plan: free
    region: frankfurt
